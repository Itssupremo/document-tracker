<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCDRA Document Tracker - Scanner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-wrapper">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main-area">
      <header class="main-header">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
          <h1 id="pageTitle">Scanner</h1>
        </div>
        <div class="header-right">
          <span id="welcomeText"></span>
        </div>
      </header>
      <div class="main-content">
        <div class="row justify-content-center">
          <div class="col-lg-7">
            <div class="content-card">
              <div class="card-top">
                <h5><i class="bi bi-qr-code-scan me-2"></i>QR Code Scanner</h5>
                <small class="text-muted">Scan a QR code to access document details</small>
              </div>
              <div class="card-body-inner">

                <!-- Camera scanner -->
                <div class="mb-3">
                  <button class="btn btn-primary w-100 mb-2" id="startCameraBtn" onclick="startCamera()">
                    <i class="bi bi-camera me-2"></i>Start Camera Scanner
                  </button>
                  <div id="reader" class="mb-3" style="display:none;"></div>
                  <button class="btn btn-outline-secondary w-100 mb-3" id="stopCameraBtn" style="display:none;" onclick="stopCamera()">
                    Stop Camera
                  </button>
                </div>

                <!-- Upload QR image fallback -->
                <div class="mb-3">
                  <label class="form-label fw-semibold">Or upload a QR code image:</label>
                  <input type="file" class="form-control" id="qrImageInput" accept="image/*">
                </div>

                <!-- Scan result -->
                <div id="scanResult" class="d-none mt-3">
                  <div class="alert alert-success">
                    <h5><i class="bi bi-check-circle me-2"></i>QR Code Detected!</h5>
                    <p class="mb-2" id="scannedUrlText"></p>
                    <a id="scannedUrl" href="#" class="btn btn-primary w-100">Open File Details</a>
                  </div>
                </div>

                <div id="scanError" class="d-none mt-3">
                  <div class="alert alert-warning">
                    <p id="scanErrorText" class="mb-0">Could not read QR code. Please try again.</p>
                  </div>
                </div>

                <hr>
                <div class="mt-3">
                  <h5>Or enter File ID manually:</h5>
                  <div class="input-group">
                    <input type="text" class="form-control" id="manualFileId" placeholder="Enter File ID (UUID)">
                    <button class="btn btn-outline-primary" onclick="goToFile()">Go</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/scanner.js"></script>
</body>
</html>
