<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Document Tracker - Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-wrapper">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main-area">
      <header class="main-header">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
          <h1 id="pageTitle">Dashboard</h1>
        </div>
        <div class="header-right">
        <img src="/ched logo.png" alt="Avatar" style="width:30px; height:30px;" class="me-2">
        </div>
      </header>
      <div class="main-content">
        <!-- Welcome Section -->
        <div class="welcome-section">
          <div>
            <h2 class="welcome-title">Welcome back, <span id="dashWelcomeName">User</span> &#128075;</h2>
            <p class="welcome-subtitle">Access documents, insights, and key analytics instantly.</p>
          </div>
          <a href="/upload" class="btn btn-primary btn-welcome">
            <i class="bi bi-plus-lg"></i> Upload New
          </a>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon blue"><i class="bi bi-file-earmark-text"></i></div>
            <div>
              <div class="stat-label">Total Documents</div>
              <div class="stat-value" id="statTotal">0</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon green"><i class="bi bi-check-circle"></i></div>
            <div>
              <div class="stat-label">Completed</div>
              <div class="stat-value" id="statCompleted">0</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon amber"><i class="bi bi-clock"></i></div>
            <div>
              <div class="stat-label">Pending</div>
              <div class="stat-value" id="statPending">0</div>
            </div>
          </div>
        </div>

        <!-- Recent Files Table -->
        <div class="data-card">
          <div class="card-top">
            <h5><i class="bi bi-file-earmark-pdf me-2"></i>Recent Documents</h5>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
              <div class="header-search" style="width:240px;min-width:180px;">
                <i class="bi bi-search"></i>
                <input type="text" id="searchInput" placeholder="Search documents...">
              </div>
            </div>
          </div>
          <div style="overflow-x:auto;">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Document ID</th>
                  <th>File Name</th>
                  <th>Uploaded By</th>
                  <th>Date</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="filesTableBody">
                <tr><td colspan="6" class="text-center py-4 text-muted">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/sidebar.js"></script>
  <script>
    document.addEventListener('userLoaded', function(e) {
      var el = document.getElementById('dashWelcomeName');
      if (el) el.textContent = e.detail.fullName || e.detail.username;
    });
  </script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
