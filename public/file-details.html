<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Document Tracker - File Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-wrapper">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main-area">
      <header class="main-header">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
          <h1 id="pageTitle">File Details</h1>
        </div>
        <div class="header-right">
          <span id="welcomeText"></span>
        </div>
      </header>
      <div class="main-content">
        <div class="row justify-content-center">
          <div class="col-lg-7">

            <!-- Loading -->
            <div id="loadingSection" class="text-center my-5">
              <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
              </div>
              <p class="mt-2">Loading file details...</p>
            </div>

            <!-- Error -->
            <div id="errorSection" class="d-none">
              <div class="alert alert-danger text-center">
                <h4>File Not Found</h4>
                <p id="errorMessage">The requested file could not be found.</p>
                <a href="/dashboard" class="btn btn-primary">Go to Dashboard</a>
              </div>
            </div>

            <!-- File Details -->
            <div id="detailsSection" class="d-none">
              <div class="content-card">
                <div class="card-top">
                  <h5><i class="bi bi-file-earmark-pdf me-2 text-danger"></i>File Details</h5>
                </div>
                <div class="card-body-inner">
                  <table class="table table-borderless">
                    <tbody>
                      <tr>
                        <th style="width: 40%;">File Name</th>
                        <td id="fileName"></td>
                      </tr>
                      <tr>
                        <th>Uploaded By</th>
                        <td id="uploaderName"></td>
                      </tr>
                      <tr id="emailRow">
                        <th>Email</th>
                        <td id="uploaderEmail"></td>
                      </tr>
                      <tr>
                        <th>Upload Date</th>
                        <td id="uploadDate"></td>
                      </tr>
                      <tr>
                        <th>File ID</th>
                        <td><code id="fileId"></code></td>
                      </tr>
                    </tbody>
                  </table>

                  <!-- PDF Actions -->
                  <div id="pdfActions" class="mt-4">
                    <div class="d-grid gap-2">
                      <button class="btn btn-primary btn-lg" onclick="viewPdf()">
                        <i class="bi bi-eye me-2"></i>View PDF
                      </button>
                      <button class="btn btn-outline-primary btn-lg" onclick="downloadPdf()">
                        <i class="bi bi-download me-2"></i>Download PDF
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/sidebar.js"></script>
  <script src="/js/file-details.js"></script>
</body>
</html>
