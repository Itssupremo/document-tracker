<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCDRA Document Tracker - User Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-wrapper">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main-area">
      <header class="main-header">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
          <h1 id="pageTitle">User Management</h1>
        </div>
        <div class="header-right">
          <span id="welcomeText"></span>
        </div>
      </header>
      <div class="main-content">
        <div class="data-card">
          <div class="card-top">
            <h5><i class="bi bi-people-fill me-2"></i>All Users</h5>
            <button class="btn btn-sm btn-primary" onclick="showAddUser()">
              <i class="bi bi-person-plus"></i> Add User
            </button>
          </div>
          <div style="overflow-x:auto;">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Username</th>
                  <th>Full Name</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Created</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="usersTableBody">
                <tr><td colspan="6" class="text-center py-4 text-muted">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add/Edit User Modal -->
  <div id="userModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <h3 id="modalTitle">Add User</h3>
      <form id="userForm">
        <input type="hidden" id="editUserId">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username *</label>
          <input type="text" class="form-control" id="modalUsername" required minlength="3" maxlength="50">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password *</label>
          <input type="password" class="form-control" id="modalPassword" minlength="6">
          <div class="form-text" id="passwordHint">Minimum 6 characters</div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Full Name</label>
          <input type="text" class="form-control" id="modalFullName" maxlength="100">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" class="form-control" id="modalEmail" maxlength="200" placeholder="user@email.com">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Role</label>
          <select class="form-select" id="modalRole">
            <option value="user">User</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div id="modalError" class="alert alert-danger py-2 d-none"></div>
        <div class="d-flex gap-2 justify-content-end">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" id="modalSubmitBtn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/sidebar.js"></script>
  <script src="/js/users.js"></script>
</body>
</html>
